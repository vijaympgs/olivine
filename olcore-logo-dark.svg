<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
<!-- Outer Ring (Dark Greenish tint) -->
<circle cx="200" cy="200" fill="none" opacity="0.8" r="160" stroke="#718376" stroke-width="4"></circle>
<!-- Inner Ring (Mustard) -->
<circle cx="200" cy="200" fill="none" r="130" stroke="#daa520" stroke-width="6"></circle>
<!-- Two Thin Horizontal Lines (Grey) -->
<line opacity="0.4" stroke="#94a3b8" stroke-width="1.5" x1="80" x2="320" y1="160" y2="160"></line>
<circle cx="80" cy="160" fill="#94a3b8" opacity="0.4" r="3"></circle>
<circle cx="320" cy="160" fill="#94a3b8" opacity="0.4" r="3"></circle>
<line opacity="0.4" stroke="#94a3b8" stroke-width="1.5" x1="80" x2="320" y1="240" y2="240"></line>
<circle cx="80" cy="240" fill="#94a3b8" opacity="0.4" r="3"></circle>
<circle cx="320" cy="240" fill="#94a3b8" opacity="0.4" r="3"></circle>
<!-- Main Horizontal Line (Light Grey) -->
<line stroke="#cbd5e1" stroke-width="2.5" x1="50" x2="350" y1="200" y2="200"></line>
<circle cx="50" cy="200" fill="#cbd5e1" r="4"></circle>
<circle cx="350" cy="200" fill="#cbd5e1" r="4"></circle>
<!-- Eye Shape (Pale Red / Coral) -->
<g fill="none" stroke="#f88379" stroke-width="6" transform="translate(200, 200)">
<path d="M-100 0 C -100 0, -40 -60, 0 -60 C 40 -60, 100 0, 100 0 C 100 0, 40 60, 0 60 C -40 60, -100 0, -100 0 Z" fill="none" stroke="#f88379" stroke-width="1.5"></path>
<circle cx="0" cy="0" fill="none" r="35" stroke="#f88379" stroke-width="1.5"></circle>
<circle cx="0" cy="0" fill="#cbd5e1" r="12"></circle>
</g>
<!-- Abstract Modern Art Vel Element (Light Grey) -->
<g transform="translate(200, 200)">
<!-- Vertical line starting from center (0,0) going upwards to -180 -->
<path d="M0 -130 L0 -180" stroke="#cbd5e1" stroke-linecap="round" stroke-width="4"></path>
<!-- Leaf-shaped tip -->
<path d="M0 -185 L20 -155 L0 -165 L-20 -155 Z" fill="#cbd5e1"></path>
</g>
</svg>
